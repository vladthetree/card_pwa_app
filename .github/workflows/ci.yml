name: CI

on:
  push:
  pull_request:

jobs:
  pwa:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: card_pwa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: card_pwa/package-lock.json
      - run: npm ci
      - run: npm test -- --run
      - run: npm run build

  sync-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: card-sync-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: pytest
